        }

        .keyboard-row {
            display: flex;
            gap: 10px;
        }

            width: 60px;
            height: 65px;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .letter-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.6);
        }

        .letter-btn:active {
            transform: translateY(-2px) scale(1.05);
        }

        .letter-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.5);
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .game-area {
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        .letter-display {
            text-align: center;
            margin-bottom: 30px;
        }

        .current-letter {
            font-size: 150px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 5px 5px 0px #ffa502, 10px 10px 20px rgba(255, 107, 107, 0.3);
            animation: bounce 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .letter-sound-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        }

        .letter-sound-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.6);
        }

        .letter-sound-btn.speaking {
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .letter-phonetic {
            font-size: 24px;
            color: #666;
            margin-top: 15px;
        }

        .letter-hint {
            font-size: 20px;
            color: #ff6b6b;
            margin-top: 15px;
            padding: 15px 25px;
            background: linear-gradient(135deg, #fff5eb, #ffe4c4);
            border-radius: 15px;
            display: inline-block;
            animation: hintBounce 1s ease;
        }

        @keyframes hintBounce {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

            margin-bottom: 20px;
            text-align: center;

            cursor: pointer;

            font-weight: bold;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ffecd2, #fcb69f);

            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.prev {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            color: white;
        }

        .nav-btn.next {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            color: #333;
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

            opacity: 0.5;
            cursor: not-allowed;
            transform: none;

            margin-bottom: 20px;

            height: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
        }

            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffa502);

                    { word: 'Star', emoji: '⭐', chinese: '星星', usage: 'Stars shine at night. (星星在夜晚闪烁。)' },
                    { word: 'Snake', emoji: '🐍', chinese: '蛇', usage: 'Snakes can slither. (蛇会滑行。)' },
                    { word: 'School', emoji: '🏫', chinese: '学校', usage: 'I go to school every day. (我每天去上学。)' }
                ]
            },
            'T': {
                phonetic: '/tiː/',
                words: [
                    { word: 'Tiger', emoji: '🐅', chinese: '老虎', usage: 'Tigers are strong. (老虎很强壮。)' },
                    { word: 'Tree', emoji: '🌳', chinese: '树', usage: 'The tree is tall. (树很高。)' },
                    { word: 'Train', emoji: '🚂', chinese: '火车', usage: 'The train goes fast. (火车开得很快。)' },
                    { word: 'Teacher', emoji: '👩‍🏫', chinese: '老师', usage: 'My teacher is nice. (我的老师很好。)' }
                ]
            },
            'U': {
                phonetic: '/juː/',
                words: [
                    { word: 'Umbrella', emoji: '☂️', chinese: '雨伞', usage: 'Take an umbrella when it rains. (下雨时带伞。)' },
                    { word: 'Unicorn', emoji: '🦄', chinese: '独角兽', usage: 'Unicorns are magical. (独角兽是魔法生物。)' },
                    { word: 'Under', emoji: '⬇️', chinese: '在下面', usage: 'The ball is under the table. (球在桌子下面。)' },
                    { word: 'Up', emoji: '⬆️', chinese: '向上', usage: 'Look up! (向上看！)' }
                ]
            },
            'V': {
                phonetic: '/viː/',
                words: [
                    { word: 'Van', emoji: '🚐', chinese: '货车', usage: 'The van carries things. (货车运东西。)' },
                    { word: 'Vegetable', emoji: '🥦', chinese: '蔬菜', usage: 'Eat your vegetables. (吃你的蔬菜。)' },
                    { word: 'Violin', emoji: '🎻', chinese: '小提琴', usage: 'Play the violin beautifully. (优美地拉小提琴。)' },
                    { word: 'Vase', emoji: '🏺', chinese: '花瓶', usage: 'Put flowers in the vase. (把花放在花瓶里。)' }
                ]
            },
            'W': {
                phonetic: '/ˈdʌbəl.juː/',
                words: [
                    { word: 'Water', emoji: '💧', chinese: '水', usage: 'Drink water every day. (每天喝水。)' },
                    { word: 'Whale', emoji: '🐋', chinese: '鲸鱼', usage: 'Whales are very big. (鲸鱼很大。)' },
                    { word: 'Window', emoji: '🪟', chinese: '窗户', usage: 'Look out the window. (看看窗外。)' },
                    { word: 'Wolf', emoji: '🐺', chinese: '狼', usage: 'The wolf howls at the moon. (狼对着月亮嚎叫。)' }
                ]
            },
            'X': {
                phonetic: '/eks/',
                words: [
                    { word: 'X-ray', emoji: '📷', chinese: 'X光', usage: 'Doctors use X-rays. (医生用X光。)' },
                    { word: 'Fox', emoji: '🦊', chinese: '狐狸', usage: 'The fox is clever. (狐狸很聪明。)' },
                    { word: 'Box', emoji: '📦', chinese: '盒子', usage: 'Open the box. (打开盒子。)' },
                    { word: 'Xylophone', emoji: '🎵', chinese: '木琴', usage: 'Play the xylophone. (弹奏木琴。)' }
                ]
            },
            'Y': {
                phonetic: '/waɪ/',
                words: [
                    { word: 'Yellow', emoji: '💛', chinese: '黄色', usage: 'Yellow is my favorite color. (黄色是我最喜欢的颜色。)' },
                    { word: 'Yummy', emoji: '😋', chinese: '美味的', usage: 'This cake is yummy! (这个蛋糕很好吃！)' },
                    { word: 'Yacht', emoji: '⛵', chinese: '游艇', usage: 'We sail on a yacht. (我们在游艇上航行。)' },
                    { word: 'Year', emoji: '📅', chinese: '年', usage: 'Happy New Year! (新年快乐！)' }
                ]
            },
            'Z': {
                phonetic: '/ziː/',
                words: [
                    { word: 'Zebra', emoji: '🦓', chinese: '斑马', usage: 'Zebras have stripes. (斑马有条纹。)' },
                    { word: 'Zoo', emoji: '🏛️', chinese: '动物园', usage: 'Let\'s go to the zoo. (我们去动物园吧。)' },
                    { word: 'Zero', emoji: '0️⃣', chinese: '零', usage: 'Zero is the number 0. (零是数字0。)' },
                    { word: 'Zigzag', emoji: '〰️', chinese: '锯齿形', usage: 'Draw a zigzag line. (画一条锯齿线。)' }
                ]
            }
        };

        const letters = Object.keys(alphabetData);
        let currentIndex = 0;
        const visitedLetters = new Set();

        // 初始化
        function init() {
            createAlphabetNav();
            showLetter(false);
        }

        // 键盘布局字母顺序
        const keyboardLayout = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['Z', 'X', 'C', 'V', 'B', 'N', 'M']
        ];

        // 创建字母导航（键盘布局）
        function createAlphabetNav() {
            const nav = document.getElementById('alphabet-nav');
            nav.innerHTML = '';
            
            keyboardLayout.forEach((row) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                
                row.forEach((letter) => {
                    const btn = document.createElement('button');
                    btn.className = 'letter-btn';
                    btn.textContent = letter;
                    btn.onclick = () => selectLetterByLetter(letter);
                    rowDiv.appendChild(btn);
                });
                
                nav.appendChild(rowDiv);
            });
        }

        // 选择字母
        function selectLetter(index) {
            currentIndex = index;
            const letter = letters[index];
            visitedLetters.add(letter);
            showLetter(true);
        }
        
        // 按字母选择（用于键盘点击）
        function selectLetterByLetter(letter) {
            const index = letters.indexOf(letter);
            currentIndex = index;
            visitedLetters.add(letter);
            showLetter(true);
            
            // 播放字母发音
            speak(letter);
            
            // 添加语音提示
            setTimeout(() => {
                const data = alphabetData[letter];
                if (data && data.words && data.words.length > 0) {
                    const firstWord = data.words[0].word;
                    speak(`Hi baby, please tell me where is ${firstWord}?`);
                }
            }, 800);
        }

        // 显示字母
        function showLetter(updateProgress = true) {
            const letter = letters[currentIndex];
            const data = alphabetData[letter];

            // 更新导航按钮状态
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === letters.length - 1;

            // 更新字母导航高亮
            const navButtons = document.querySelectorAll('.letter-btn');
            navButtons.forEach((btn) => {
                btn.classList.toggle('active', btn.textContent === letter);
            });

            // 更新进度条（基于已访问的不同字母个数）
            if (updateProgress) {
                const visitedCount = visitedLetters.size;
                const progress = (visitedCount / letters.length) * 100;
                document.getElementById('progress-fill').style.width = `${progress}%`;
                document.getElementById('progress-text').textContent = `已学习 ${visitedCount} / ${letters.length} 个字母`;
            }

            // 更新单词卡片
            updateWords(data.words);
        }

        // 记录当前关卡已点击的单词索引
        let currentWordIndex = 0;
        
        // 鼓励语列表
        const encouragementWords = ['Wow!', 'Good job!', 'Great!', 'Excellent!', 'Awesome!', 'Wonderful!'];
        
        // 获取随机鼓励语
        function getRandomEncouragement() {
            return encouragementWords[Math.floor(Math.random() * encouragementWords.length)];
        }

        // 更新单词卡片
        function updateWords(words) {
            const grid = document.getElementById('words-grid');
            grid.innerHTML = '';
            currentWordIndex = 0;

            words.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <div class="word-emoji">${item.emoji}</div>
                    <div class="word-text">${item.word}</div>
                    <div class="word-chinese">${item.chinese}</div>
                    <button class="word-sound-btn" data-word="${item.word}" data-index="${index}">🔊 发音</button>
                    <div class="word-usage">💡 用法: ${item.usage}</div>
                    <button class="usage-sound-btn" data-usage="${item.usage}">🔊 朗读用法</button>
                `;
                grid.appendChild(card);
            });
            
            // 添加事件监听器
            document.querySelectorAll('.word-sound-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const word = this.dataset.word;
                    const index = parseInt(this.dataset.index);
                    handleWordClick(word, index);
                });
            });
            
            document.querySelectorAll('.usage-sound-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    speakUsage(this.dataset.usage);
                });
            });
        }
        
        // 处理单词点击
        function handleWordClick(word, index) {
            const currentLetter = letters[currentIndex];
            const words = alphabetData[currentLetter].words;
            
            // 检查是否是当前应该点击的单词
            if (index === currentWordIndex) {
                // 说鼓励语
                speak(getRandomEncouragement());
                
                // 延迟后继续提问
                setTimeout(() => {
                    currentWordIndex++;
                    if (currentWordIndex < words.length) {
                        const nextWord = words[currentWordIndex].word;
                        speak(`Then where is ${nextWord}?`);
                    } else {
                        // 完成所有单词
                        speak('You found all the words! Great job!');
                    }
                }, 1000);
            }
            // 无论是否正确，都读单词发音
            speakWord(word);
        }

        // 发音功能
        function speak(text) {
            if ('speechSynthesis' in window) {
                // 停止之前的语音
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8; // 慢一点，适合小朋友
                utterance.pitch = 1.2; // 高一点，更可爱

                window.speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音功能，请使用Chrome或Safari浏览器。');
            }
        }

        // 读字母
        function speakLetter() {
            const letter = letters[currentIndex];
            const btn = document.getElementById('letter-sound-btn');
            btn.classList.add('speaking');
            speak(letter);
            setTimeout(() => btn.classList.remove('speaking'), 1000);
        }

        // 读单词
        function speakWord(word) {
            speak(word);
        }

        // 读用法
        function speakUsage(usage) {
            // 移除括号和中文部分，只保留英文句子
            const englishPart = usage.split('(')[0].trim();
            speak(englishPart);
        }

        // 上一个字母
        function prevLetter() {
            if (currentIndex > 0) {
                currentIndex--;
                const letter = letters[currentIndex];
                visitedLetters.add(letter);
                showLetter(true);
            }
        }

        // 下一个字母
        function nextLetter() {
            if (currentIndex < letters.length - 1) {
                currentIndex++;
                const letter = letters[currentIndex];
                visitedLetters.add(letter);
                showLetter(true);
            }
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevLetter();
            } else if (e.key === 'ArrowRight') {
                nextLetter();
            } else {
                // 支持键盘输入字母直接切换
                const key = e.key.toUpperCase();
                if (letters.includes(key)) {
                    selectLetterByLetter(key);
                }
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
